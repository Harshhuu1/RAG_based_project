name: CD Pipeline

#Run when code is merged to main

on:
  push:
    branches:
      - main

jobs:
  deploy:
  #uses a freegithub linux server
    runs-on: ubuntu-latest

    steps:
    #Step1-download your code
      - name: Checkout code
        uses: actions/checkout@v4

      #step 2 -Login to Docker hub
      #credentials read from github secrets
      - name: Login to docker hub 
        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


        #step 3 -Build and push APi image to docker hub

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true 
          tags: ${{ secrets.DOCKER_USERNAME }}/docmind-api:latest

      # step 4 - build and push UI image to docker hub
      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ui
          push: true
          tags: ${{secrets_DOCKER_USERNAME}}/docmind-ui:latest

        #step 5 notify deployment success
      - name: Notify success
        run: echo " Docmind deployed successfully!"

        


