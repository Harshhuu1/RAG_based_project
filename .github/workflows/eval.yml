name: Scheduled Evaluation

#Run every week on Monday at 9am UTC
#Also can be triggered manually from github actions UI

on:
  schedule:
    - cron: "0 9 * * 1" 
  workflow_dispatch:
jobs:
  evaluate:
    #uses a free github server
    runs-on: ubuntu-latest

    steps:
    #steps 1 -Download your code
    - name: set up Python
      uses: actions/checkout@v4

      #step2 -Install python 3.11
    - name: set up python 
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    #step -3 Install all packages
    - name: Install dependencies
      run: pip install -r requirements.txt

    #step 4 - Run full RAGAS evaluation
    #if scores drop below threshold , next steps opens a Github issue
    - name: Run RAGAS evaluation
      id: evaluation
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY}}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY}}
      run: python -m evaluation.ragas_eval

    #step 5- open github Issue automatically if evaluation fails
    #this alerts you that RAG quality has dropped

    - name: Create issue if evaluation failed
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
          owner: context.repo.owner,
          repo: context.repo.repo,
          title: "🥲 RAG evaluation score dropped below threshold",
          body: "The weekly ragas evaluation failed. Please check  mlflow for details.",
          labels: ["evaluation","bug"]
          })


