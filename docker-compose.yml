

services:
  
  #--------FastAPI Backend--------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
    - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - chromadb
      - mlflow
    restart: unless-stopped

  #streamlit Frontend---------
  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - api
    restart: unless-stopped
  #chromeDB vector Database_____________

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
  
  #mlflow Tracking Server
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  #Prometheus
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    
    #__Grafana
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/dashboard:/etc/grafana/provisioning.dashboards
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  chroma_data:
  mlflow_data:
  grafana_data:


